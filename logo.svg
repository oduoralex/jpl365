<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#1a1a1a"/>

  <!-- JPL 365 centered using a single text with tspans -->
  <text
    x="400"
    y="430"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="160"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-2"
  >
    <tspan fill="#ffffff">JPL </tspan><tspan fill="#e02020">365</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="400"
    y="490"
    font-family="'Courier New', Courier, monospace"
    font-size="26"
    font-weight="400"
    fill="#cccccc"
